name: Deploy Staging

# ─────────────────────────────────────────────────────────────────────────────
# Staging deployment workflow.
#
# Triggers:
#   - Manual dispatch from the Actions tab.
#   - Push to the security/hardening-phase-1-2-3 branch (the active PR branch).
#     Remove this trigger once the PR merges to main; staging should be
#     re-pointed at a long-lived `staging` branch then.
#
# Secrets are read from the GitHub Environment named `staging` so production
# can keep the same secret names with different values in its own environment.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
  push:
    branches:
      - security/hardening-phase-1-2-3

concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # 0. Preflight — assert secrets shape WITHOUT revealing values.
  #
  # GitHub Actions automatically masks any secret value that appears in
  # logs. We use that to compare each staging-critical secret to a known
  # pattern (e.g. ends with `/turath-staging`, equals `875`) and emit
  # only `PASS` / `FAIL` markers. The workflow halts before any SSH or
  # rsync runs if any secret looks like it points at production.
  # Bound to environment `Mac` so the secrets are visible to the job.
  # ───────────────────────────────────────────────────────────────────────────
  preflight:
    name: Preflight (staging-shape secrets)
    runs-on: ubuntu-latest
    environment:
      name: Mac
    steps:
      - name: Verify secrets are staging-shaped
        env:
          V_VPS_PATH: ${{ secrets.VPS_PATH }}
          V_APP_PORT: ${{ secrets.APP_PORT }}
          V_PM2_APP_NAME: ${{ secrets.PM2_APP_NAME }}
          V_NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
        run: |
          # Each check echoes only a PASS/FAIL label — the secret values
          # themselves are also masked by GitHub even if they did print.
          fail=0
          if [[ "$V_VPS_PATH" == */turath-staging ]]; then
            echo "VPS_PATH ends with /turath-staging   : PASS"
          else
            echo "VPS_PATH ends with /turath-staging   : FAIL"
            fail=1
          fi
          if [[ "$V_APP_PORT" == "875" ]]; then
            echo "APP_PORT == 875                       : PASS"
          else
            echo "APP_PORT == 875                       : FAIL"
            fail=1
          fi
          if [[ "$V_PM2_APP_NAME" == "turath-staging" ]]; then
            echo "PM2_APP_NAME == turath-staging        : PASS"
          else
            echo "PM2_APP_NAME == turath-staging        : FAIL"
            fail=1
          fi
          if [[ "$V_NEXT_PUBLIC_SITE_URL" == *":875"* ]]; then
            echo "NEXT_PUBLIC_SITE_URL contains :875    : PASS"
          else
            echo "NEXT_PUBLIC_SITE_URL contains :875    : FAIL"
            fail=1
          fi
          if [ "$fail" -eq 1 ]; then
            echo "::error::One or more secrets are NOT staging-shaped. Refusing to deploy."
            exit 1
          fi
          echo "All preflight checks passed."

  # ───────────────────────────────────────────────────────────────────────────
  # 1. Quality gates — fail fast before touching the VPS.
  #
  # Bound to the same environment as preflight + deploy so the build step
  # can read the Supabase env vars from secrets. Without this, the
  # `/_not-found` prerender step fails with "@supabase/ssr: Your project's
  # URL and API key are required" because the layout-level AuthProvider
  # constructs a client at module load.
  # ───────────────────────────────────────────────────────────────────────────
  quality:
    name: Quality gates
    needs: preflight
    runs-on: ubuntu-latest
    environment:
      name: Mac
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.3
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      # The build here is a CI smoke test only; the real production-like
      # build happens on the VPS in the `deploy` job.
      - name: Build (CI smoke test)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
        run: pnpm build

  # ───────────────────────────────────────────────────────────────────────────
  # 2. Deploy — only after quality gates pass.
  # ───────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to staging VPS
    needs: quality
    runs-on: ubuntu-latest
    # TEMPORARY: pointing at the existing `Mac` environment until a
    # dedicated `staging` environment is created in repo Settings →
    # Environments. The 9 deploy secrets are configured under `Mac`.
    # Per GitHub docs, `environment.url` cannot use the `secrets` context,
    # so the field is omitted (URL link in the Actions UI is optional).
    environment:
      name: Mac
    steps:
      - uses: actions/checkout@v4

      # Loads the private key into ssh-agent for the lifetime of this job.
      # The key never appears on disk and is wiped when the runner is destroyed.
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          chmod 644 ~/.ssh/known_hosts

      - name: Ensure target directory exists on VPS
        run: |
          ssh -o StrictHostKeyChecking=yes \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "mkdir -p '${{ secrets.VPS_PATH }}' && chmod 755 '${{ secrets.VPS_PATH }}'"

      # Writes /<VPS_PATH>/.env on the server with staging values.
      # Secrets are masked in workflow logs — they don't appear in stdout.
      - name: Write .env on VPS
        env:
          ENV_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          ENV_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          ENV_SITE: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PATH: ${{ secrets.VPS_PATH }}
        run: |
          ssh -o StrictHostKeyChecking=yes "$VPS_USER@$VPS_HOST" \
            "umask 077 && cat > '$VPS_PATH/.env' && chmod 600 '$VPS_PATH/.env'" <<ENV_EOF
          NEXT_PUBLIC_SUPABASE_URL=$ENV_URL
          NEXT_PUBLIC_SUPABASE_ANON_KEY=$ENV_KEY
          NEXT_PUBLIC_SITE_URL=$ENV_SITE
          ENV_EOF

      # Runs the existing deploy_vps.sh, which handles rsync + remote build
      # + PM2 restart. PM2_APP_NAME isolates this from production.
      - name: Run deploy_vps.sh
        env:
          VPS_IP: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PATH: ${{ secrets.VPS_PATH }}
          APP_PORT: ${{ secrets.APP_PORT }}
          PM2_APP_NAME: ${{ secrets.PM2_APP_NAME }}
        run: |
          chmod +x ./deploy_vps.sh
          ./deploy_vps.sh

      # Best-effort smoke check. Fails the workflow if the staging URL doesn't
      # respond with 2xx/3xx within 30 seconds. Set to `continue-on-error: true`
      # if your VPS firewalls GitHub runner IPs.
      - name: Verify staging responds
        run: |
          set -e
          for i in 1 2 3 4 5 6; do
            STATUS=$(curl -sk -o /dev/null -w "%{http_code}" \
              --max-time 10 \
              "${{ secrets.NEXT_PUBLIC_SITE_URL }}" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [[ "$STATUS" =~ ^[23] ]]; then
              echo "✅ Staging is responding"
              exit 0
            fi
            sleep 5
          done
          echo "❌ Staging did not respond with 2xx/3xx within ~60s"
          exit 1
